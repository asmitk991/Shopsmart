version: '3.9'

services:
  server:
    build:
      context: ./server
      target: runtime
    ports:
      - '5001:5001'
    environment:
      DATABASE_URL: file:/app/data/dev.db
      JWT_SECRET: local-dev-secret
      NODE_ENV: development
    volumes:
      - sqlite-data:/app/data

  client:
    build:
      context: ./client
      target: runtime
    ports:
      - '8080:80'
    depends_on:
      - server

volumes:
  sqlite-data:
