name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: shopsmart
  TF_VAR_subnet_id: ${{ secrets.AWS_SUBNET_ID }}
  TF_VAR_security_group_id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  test-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # --- Phase 1: Testing (Rubric 1) ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Server Tests
        run: |
          npm ci --prefix server
          npm run prisma:migrate --prefix server
          npm run test:ci --prefix server
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key

      - name: Run Client Tests
        run: |
          npm ci --prefix client
          npm run test:ci --prefix client

      - name: Generate Test Reports (Rubric 1)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            server/coverage/
            client/coverage/

      # --- Phase 2: Infrastructure (Rubric 2 - Order: Tests -> Terraform) ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Validate
        run: |
          terraform init
          terraform validate

      - name: Terraform Import & Apply
        run: |
          terraform import aws_ecr_repository.server "${{ env.PROJECT_NAME }}-server" || true
          terraform import aws_ecr_repository.client "${{ env.PROJECT_NAME }}-client" || true
          terraform import aws_ecs_cluster.main "${{ env.PROJECT_NAME }}-cluster" || true
          terraform import aws_cloudwatch_log_group.ecs "/ecs/${{ env.PROJECT_NAME }}" || true
          terraform apply -auto-approve

      # --- Phase 3: Build & Push (Rubric 3 - Order: Terraform -> Build) ---
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.PROJECT_NAME }}-server:$TAG ./server
          docker tag $ECR_REGISTRY/${{ env.PROJECT_NAME }}-server:$TAG $ECR_REGISTRY/${{ env.PROJECT_NAME }}-server:latest
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-server:latest
          
          docker build -t $ECR_REGISTRY/${{ env.PROJECT_NAME }}-client:$TAG ./client
          docker tag $ECR_REGISTRY/${{ env.PROJECT_NAME }}-client:$TAG $ECR_REGISTRY/${{ env.PROJECT_NAME }}-client:latest
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-client:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service --cluster ${{ env.PROJECT_NAME }}-cluster --service ${{ env.PROJECT_NAME }}-service --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable --cluster ${{ env.PROJECT_NAME }}-cluster --services ${{ env.PROJECT_NAME }}-service --region ${{ env.AWS_REGION }}

      - name: Verify Service (Rubric 3 - Healthcheck)
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster ${{ env.PROJECT_NAME }}-cluster --service-name ${{ env.PROJECT_NAME }}-service --query 'taskArns[0]' --output text --region ${{ env.AWS_REGION }})
          ENI=$(aws ecs describe-tasks --cluster ${{ env.PROJECT_NAME }}-cluster --tasks $TASK_ARN --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' --output text --region ${{ env.AWS_REGION }})
          IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI --query 'NetworkInterfaces[0].Association.PublicIp' --output text --region ${{ env.AWS_REGION }})
          echo "============================================"
          echo "  ✅ DEPLOYMENT SUCCESSFUL"
          echo "  App URL: http://$IP:8080"
          echo "============================================"
          curl -f http://$IP:8080/health || exit 1
