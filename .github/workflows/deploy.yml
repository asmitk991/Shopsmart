name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: shopsmart
  TF_VAR_subnet_id: ${{ secrets.AWS_SUBNET_ID }}
  TF_VAR_security_group_id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  test-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- Phase 1: Testing (Rubric Compliance) ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Server Tests
        run: |
          npm ci --prefix server
          npm run prisma:migrate --prefix server
          npm run test:ci --prefix server
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key

      - name: Client Tests
        run: |
          npm ci --prefix client
          npm run test:ci --prefix client

      # --- Phase 2: AWS Configuration ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- Step 3: Ensure ECR Repositories Exist (Professor's Trick) ---
      - name: Ensure ECR Repositories Exist
        run: |
          aws ecr describe-repositories --repository-names "${{ env.PROJECT_NAME }}-server" --region "${{ env.AWS_REGION }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ env.PROJECT_NAME }}-server" --region "${{ env.AWS_REGION }}"
          
          aws ecr describe-repositories --repository-names "${{ env.PROJECT_NAME }}-client" --region "${{ env.AWS_REGION }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ env.PROJECT_NAME }}-client" --region "${{ env.AWS_REGION }}"

      # --- Step 4: Build & Push Images ---
      - name: Build, Tag & Push Server Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.PROJECT_NAME }}-server:$IMAGE_TAG
          docker build -t $IMAGE_URI ./server
          docker push $IMAGE_URI
          docker tag $IMAGE_URI $ECR_REGISTRY/${{ env.PROJECT_NAME }}-server:latest
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-server:latest

      - name: Build, Tag & Push Client Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.PROJECT_NAME }}-client:$IMAGE_TAG
          docker build -t $IMAGE_URI ./client
          docker push $IMAGE_URI
          docker tag $IMAGE_URI $ECR_REGISTRY/${{ env.PROJECT_NAME }}-client:latest
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-client:latest

      # --- Phase 3: Infrastructure (Terraform) ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      # --- Step 5: Terraform Import (Professor's Secret Sauce) ---
      - name: Terraform Import Existing ECRs
        run: |
          terraform import aws_ecr_repository.server "${{ env.PROJECT_NAME }}-server" || true
          terraform import aws_ecr_repository.client "${{ env.PROJECT_NAME }}-client" || true

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  ✅ DEPLOYMENT COMPLETE"
          echo "============================================"
          echo "👉 Go to AWS Console → ECS → Clusters"
          echo "   → shopsmart-cluster → Tasks"
          echo "   → Copy Public IP → Open in browser :8080"
