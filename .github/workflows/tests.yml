name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: npm ci --prefix server

      - name: Install client deps
        run: npm ci --prefix client

      - name: Lint server
        run: npm run lint --prefix server

      - name: Lint client
        run: npm run lint --prefix client

      - name: Check formatting
        run: npm run format:check

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install server deps
        run: npm ci --prefix server

      - name: Run Prisma migrations
        run: npm run prisma:migrate --prefix server
        env:
          DATABASE_URL: file:./test.db

      - name: Run server tests
        run: npm run test:ci --prefix server
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-test-results
          path: server/test-results/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-coverage
          path: server/coverage/

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install client deps
        run: npm ci --prefix client

      - name: Run client tests
        run: npm run test:ci --prefix client

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: client-test-results
          path: client/test-results/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: client-coverage
          path: client/coverage/
