name: EC2 Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run on EC2'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - status

jobs:
  ec2_command:
    name: Execute on EC2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SSH and run command on EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== Action: ${{ github.event.inputs.action }} ==="

            if [ "${{ github.event.inputs.action }}" = "deploy" ]; then
              cd /home/ubuntu/shopsmart
              git pull origin main
              npm ci --prefix server
              npm run build --prefix client
              pm2 restart shopsmart-server || pm2 start server/src/index.js --name shopsmart-server
              echo "Deploy complete"

            elif [ "${{ github.event.inputs.action }}" = "restart" ]; then
              pm2 restart shopsmart-server
              echo "Restart complete"

            elif [ "${{ github.event.inputs.action }}" = "status" ]; then
              pm2 status
              echo "Status check complete"
            fi
