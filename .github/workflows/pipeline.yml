name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  tests:
    name: Run All Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & test server
        run: |
          npm ci --prefix server
          npm run prisma:migrate --prefix server
          npm run test:ci --prefix server
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key

      - name: Install & test client
        run: |
          npm ci --prefix client
          npm run test:ci --prefix client

      - name: Upload all test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            server/test-results/
            server/coverage/
            client/test-results/
            client/coverage/

  deploy_all:
    name: Infra & Build & Deploy
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init
        working-directory: infra

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}"
        working-directory: infra

      - name: Get Infrastructure Outputs
        id: infra_out
        run: |
          echo "server_ecr=$(terraform output -raw ecr_server_url)" >> $GITHUB_OUTPUT
          echo "client_ecr=$(terraform output -raw ecr_client_url)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "server_service=$(terraform output -raw ecs_server_service_name)" >> $GITHUB_OUTPUT
          echo "client_service=$(terraform output -raw ecs_client_service_name)" >> $GITHUB_OUTPUT
          echo "ec2_ip=$(terraform output -raw manual_deploy_ip)" >> $GITHUB_OUTPUT
        working-directory: infra

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push server image
        env:
          ECR_REPO: ${{ steps.infra_out.outputs.server_ecr }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG ./server
          docker push $ECR_REPO:$IMAGE_TAG

      - name: Build & push client image
        env:
          ECR_REPO: ${{ steps.infra_out.outputs.client_ecr }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG ./client
          docker push $ECR_REPO:$IMAGE_TAG

      - name: Deploy to ECS Fargate
        env:
          CLUSTER: ${{ steps.infra_out.outputs.cluster_name }}
          SERVER_SERVICE: ${{ steps.infra_out.outputs.server_service }}
          CLIENT_SERVICE: ${{ steps.infra_out.outputs.client_service }}
        run: |
          aws ecs update-service --cluster $CLUSTER --service $SERVER_SERVICE --force-new-deployment --region ${{ secrets.AWS_REGION }}
          aws ecs update-service --cluster $CLUSTER --service $CLIENT_SERVICE --force-new-deployment --region ${{ secrets.AWS_REGION }}
          aws ecs wait services-stable --cluster $CLUSTER --services $SERVER_SERVICE $CLIENT_SERVICE --region ${{ secrets.AWS_REGION }}

      - name: Smoke test - health check
        env:
          CLUSTER: ${{ steps.infra_out.outputs.cluster_name }}
          SERVER_SERVICE: ${{ steps.infra_out.outputs.server_service }}
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster $CLUSTER --service-name $SERVER_SERVICE --query 'taskArns[0]' --output text --region ${{ secrets.AWS_REGION }})
          ENI=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $TASK_ARN --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' --output text --region ${{ secrets.AWS_REGION }})
          PUBLIC_IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI --query 'NetworkInterfaces[0].Association.PublicIp' --output text --region ${{ secrets.AWS_REGION }})
          echo "Server public IP: $PUBLIC_IP"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$PUBLIC_IP:5001/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          exit 1
