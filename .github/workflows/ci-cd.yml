name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    name: Run All Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & test server
        run: |
          npm ci --prefix server
          npm run prisma:migrate --prefix server
          npm run test:ci --prefix server
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key

      - name: Install & test client
        run: |
          npm ci --prefix client
          npm run test:ci --prefix client

      - name: Upload all test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            server/test-results/
            server/coverage/
            client/test-results/
            client/coverage/

  deploy_all:
    name: Infra & Build & Deploy
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init
        working-directory: infra

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}"
        working-directory: infra

      - name: Get Infrastructure Outputs
        id: infra_out
        run: |
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "service_name=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT
          echo "server_ecr=$(terraform output -raw ecr_server_url)" >> $GITHUB_OUTPUT
          echo "client_ecr=$(terraform output -raw ecr_client_url)" >> $GITHUB_OUTPUT
        working-directory: infra

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push images
        env:
          SERVER_REPO: ${{ steps.infra_out.outputs.server_ecr }}
          CLIENT_REPO: ${{ steps.infra_out.outputs.client_ecr }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $SERVER_REPO:$TAG ./server
          docker push $SERVER_REPO:$TAG
          docker build -t $CLIENT_REPO:$TAG ./client
          docker push $CLIENT_REPO:$TAG

      - name: Deploy to ECS
        env:
          CLUSTER: ${{ steps.infra_out.outputs.cluster_name }}
          SERVICE: ${{ steps.infra_out.outputs.service_name }}
        run: |
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment --region ${{ secrets.AWS_REGION }}
          aws ecs wait services-stable --cluster $CLUSTER --services $SERVICE --region ${{ secrets.AWS_REGION }}

      - name: Smoke test
        env:
          CLUSTER: ${{ steps.infra_out.outputs.cluster_name }}
          SERVICE: ${{ steps.infra_out.outputs.service_name }}
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster $CLUSTER --service-name $SERVICE --query 'taskArns[0]' --output text --region ${{ secrets.AWS_REGION }})
          ENI=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $TASK_ARN --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' --output text --region ${{ secrets.AWS_REGION }})
          IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI --query 'NetworkInterfaces[0].Association.PublicIp' --output text --region ${{ secrets.AWS_REGION }})
          echo "Public IP: $IP"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$IP:8080/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying..."
            sleep 10
          done
          exit 1
